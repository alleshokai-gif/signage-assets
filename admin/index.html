<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>管理メニュー</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b12;
      --panel: rgba(255,255,255,.08);
      --panel-strong: rgba(255,255,255,.13);
      --line: rgba(255,255,255,.16);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.66);
      --accent: #5eead4;
      --shadow: 0 18px 42px rgba(0,0,0,.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 0%, rgba(94,234,212,.16), transparent 32rem),
        linear-gradient(180deg, #101827 0%, var(--bg) 58%);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    button, a { font: inherit; }

    .shell {
      width: min(1040px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: .02em;
    }

    .back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0,0,0,.18);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      display: grid;
      gap: 7px;
      min-height: 112px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      box-shadow: var(--shadow);
    }

    .card:active { transform: scale(.99); background: var(--panel-strong); }

    .label {
      font-size: 1.25rem;
      font-weight: 850;
    }

    .url {
      color: var(--muted);
      font-size: .9rem;
      overflow-wrap: anywhere;
    }

    .todo {
      color: #fbbf24;
    }

    @media (max-width: 720px) {
      .shell { padding: 16px; }
      .topbar { align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 96px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>⚙️ 管理メニュー</h1>
      <a class="back" href="../index.html">戻る</a>
    </header>

    <section id="adminLinks" class="grid" aria-label="管理リンク"></section>
  </main>

  <script>
    const ADMIN_URLS = {
      alert: "./alert/index.html",
      energyPortal: "./energy/index.html",
      energyMonitorLooker: "TODO_URL_ENERGY_MONITOR_LOOKER",
      energyAnalysisLooker: "TODO_URL_ENERGY_ANALYSIS_LOOKER",
      energySpreadsheet: "TODO_URL_ENERGY_SPREADSHEET",
      utilityBillSpreadsheet: "TODO_URL_UTILITY_BILL_SPREADSHEET",
      financeAdmin: "TODO_URL_FINANCE_ADMIN",
      systemStatus: "TODO_URL_SYSTEM_STATUS"
    };

    const LINKS = [
      ["アラート設定", ADMIN_URLS.alert],
      ["電力ポータル", ADMIN_URLS.energyPortal],
      ["電力モニターLooker", ADMIN_URLS.energyMonitorLooker],
      ["分析用Looker", ADMIN_URLS.energyAnalysisLooker],
      ["EnergyManagementスプレッドシート", ADMIN_URLS.energySpreadsheet],
      ["Utility billスプレッドシート", ADMIN_URLS.utilityBillSpreadsheet],
      ["ファイナンス管理", ADMIN_URLS.financeAdmin],
      ["システム状態", ADMIN_URLS.systemStatus]
    ];

    const isTodoUrl = (url) => !url || url === "#" || String(url).startsWith("TODO_");

    document.getElementById("adminLinks").innerHTML = LINKS.map(([label, url]) => {
      const todo = isTodoUrl(url);
      const href = todo ? "#" : url;
      return `
        <a class="card" href="${href}" ${todo ? 'aria-disabled="true"' : ""}>
          <span class="label">${label}</span>
          <span class="url ${todo ? "todo" : ""}">${todo ? url : href}</span>
        </a>
      `;
    }).join("");
  </script>
</body>
</html>

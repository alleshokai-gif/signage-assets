<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成長曲線</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
  <script src="assets/js/app.js?v=20260623-2" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Growth Chart</p>
        <h1>成長曲線</h1>
      </div>
      <div class="status-pill" id="status">読み込み前</div>
    </header>

    <section class="control-panel" aria-label="表示設定">
      <label class="field">
        <span>子供</span>
        <select id="childSelect" disabled>
          <option value="">読み込み中</option>
        </select>
      </label>

      <fieldset class="mode-switch" aria-label="表示モード">
        <legend>表示</legend>
        <label>
          <input type="radio" name="mode" value="height" checked>
          <span>身長</span>
        </label>
        <label>
          <input type="radio" name="mode" value="weight">
          <span>体重</span>
        </label>
        <label>
          <input type="radio" name="mode" value="both">
          <span>身長＋体重</span>
        </label>
      </fieldset>
    </section>

    <section class="summary-grid" aria-label="最新データ">
      <div class="summary-card">
        <span>最新測定日</span>
        <strong id="latestDate">-</strong>
      </div>
      <div class="summary-card">
        <span>身長</span>
        <strong id="latestHeight">-</strong>
      </div>
      <div class="summary-card">
        <span>体重</span>
        <strong id="latestWeight">-</strong>
      </div>
      <div class="summary-card">
        <span>SDS</span>
        <strong id="latestSds">-</strong>
      </div>
    </section>

    <section class="chart-panel" aria-label="成長曲線グラフ">
      <div class="chart-header">
        <h2 id="chartTitle">身長</h2>
        <p id="curveNote">SDS曲線を読み込み中</p>
      </div>
      <div class="chart-wrap">
        <canvas id="growthChart"></canvas>
      </div>
    </section>

    <section class="message-panel" id="messagePanel" hidden>
      <h2 id="messageTitle">エラー</h2>
      <p id="messageBody"></p>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成長曲線</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js" defer></script>
  <script src="assets/js/app.js?v=20260623-6" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Growth Chart</p>
        <h1>成長曲線</h1>
      </div>
      <div class="status-pill" id="status">読み込み前</div>
    </header>

    <nav class="main-tabs" aria-label="メニュー">
      <button class="main-tab is-active" type="button" data-view="chart">グラフ</button>
      <button class="main-tab" type="button" data-view="compare">比較</button>
      <button class="main-tab" type="button" data-view="input">入力</button>
    </nav>

    <section class="control-panel chart-view" aria-label="表示設定">
      <label class="field">
        <span>子供</span>
        <select id="childSelect" disabled>
          <option value="">読み込み中</option>
        </select>
      </label>

      <fieldset class="mode-switch" aria-label="表示モード">
        <legend>表示</legend>
        <label>
          <input type="radio" name="mode" value="height" checked>
          <span>身長</span>
        </label>
        <label>
          <input type="radio" name="mode" value="weight">
          <span>体重</span>
        </label>
        <label>
          <input type="radio" name="mode" value="both">
          <span>身長＋体重</span>
        </label>
      </fieldset>
    </section>

    <section class="input-panel input-view" aria-label="入力" hidden>
      <div class="sub-tabs" role="tablist" aria-label="入力種類">
        <button class="sub-tab is-active" type="button" data-input-view="measurement">測定データ追加</button>
        <button class="sub-tab" type="button" data-input-view="child">子ども追加</button>
      </div>

      <form class="input-form" id="measurementForm" novalidate>
        <label class="field">
          <span>子ども</span>
          <select id="measurementChildSelect" required disabled>
            <option value="">読み込み中</option>
          </select>
        </label>

        <label class="field">
          <span>測定日</span>
          <input id="measurementDate" type="date" required>
        </label>

        <div class="field">
          <span>身長 cm</span>
          <div class="stepper" data-stepper="heightInput" data-step="0.1">
            <button type="button" data-step-direction="-1" aria-label="身長を減らす">-</button>
            <input id="heightInput" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例 120.5">
            <button type="button" data-step-direction="1" aria-label="身長を増やす">+</button>
          </div>
        </div>

        <div class="field">
          <span>体重 kg</span>
          <div class="stepper" data-stepper="weightInput" data-step="0.1">
            <button type="button" data-step-direction="-1" aria-label="体重を減らす">-</button>
            <input id="weightInput" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例 22.3">
            <button type="button" data-step-direction="1" aria-label="体重を増やす">+</button>
          </div>
        </div>

        <button class="primary-button" id="measurementSubmit" type="submit">保存</button>
      </form>

      <form class="input-form" id="childForm" novalidate hidden>
        <label class="field">
          <span>名前</span>
          <input id="childNameInput" type="text" autocomplete="off" required>
        </label>

        <label class="field">
          <span>性別</span>
          <select id="childSexInput" required>
            <option value="">選択してください</option>
            <option value="1">男</option>
            <option value="0">女</option>
          </select>
        </label>

        <label class="field">
          <span>生年月日</span>
          <input id="childBirthDateInput" type="date" required>
        </label>

        <div class="field">
          <span>父身長 cm（任意）</span>
          <div class="stepper" data-stepper="fatherHeightInput" data-step="0.1">
            <button type="button" data-step-direction="-1" aria-label="父身長を減らす">-</button>
            <input id="fatherHeightInput" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例 172.0">
            <button type="button" data-step-direction="1" aria-label="父身長を増やす">+</button>
          </div>
        </div>

        <div class="field">
          <span>母身長 cm（任意）</span>
          <div class="stepper" data-stepper="motherHeightInput" data-step="0.1">
            <button type="button" data-step-direction="-1" aria-label="母身長を減らす">-</button>
            <input id="motherHeightInput" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例 158.0">
            <button type="button" data-step-direction="1" aria-label="母身長を増やす">+</button>
          </div>
        </div>

        <button class="primary-button" id="childSubmit" type="submit">保存</button>
      </form>
    </section>

    <section class="summary-grid chart-view" aria-label="最新データ">
      <div class="summary-card">
        <span>最新測定日</span>
        <strong id="latestDate">-</strong>
      </div>
      <div class="summary-card">
        <span>身長</span>
        <strong id="latestHeight">-</strong>
      </div>
      <div class="summary-card">
        <span>体重</span>
        <strong id="latestWeight">-</strong>
      </div>
      <div class="summary-card">
        <span>SDS</span>
        <strong id="latestSds">-</strong>
      </div>
    </section>

    <section class="chart-panel chart-view" aria-label="成長曲線グラフ">
      <div class="chart-header">
        <h2 id="chartTitle">身長</h2>
        <p id="curveNote">SDS曲線を読み込み中</p>
      </div>
      <div class="chart-wrap">
        <canvas id="growthChart"></canvas>
      </div>
    </section>

    <section class="control-panel compare-view" aria-label="比較設定" hidden>
      <fieldset class="mode-switch" aria-label="比較モード">
        <legend>比較項目</legend>
        <label>
          <input type="radio" name="compareMode" value="height" checked>
          <span>身長</span>
        </label>
        <label>
          <input type="radio" name="compareMode" value="weight">
          <span>体重</span>
        </label>
      </fieldset>

      <fieldset class="compare-picker" aria-label="比較する子供">
        <legend>子供を比較</legend>
        <div class="compare-children" id="compareChildren"></div>
      </fieldset>
    </section>

    <section class="compare-warning compare-view" id="compareWarning" hidden>
      比較対象が多いとスマホでは線が重なって見づらくなる場合があります。
    </section>

    <section class="chart-panel compare-view" aria-label="比較グラフ" hidden>
      <div class="chart-header">
        <h2 id="compareChartTitle">身長比較</h2>
        <p id="compareNote">実測値のみを表示</p>
      </div>
      <div class="chart-wrap">
        <canvas id="compareChart"></canvas>
      </div>
    </section>

    <section class="message-panel" id="messagePanel" hidden>
      <h2 id="messageTitle">エラー</h2>
      <p id="messageBody"></p>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signage Portal</title>
  <style>
    :root{
      --menu-h: 150px;            /* アイコンでかめ */
      --menu-gap: 22px;
      --menu-pad: 18px;
      --menu-radius: 26px;
      --menu-bg: rgba(0,0,0,.22);
      --menu-border: rgba(255,255,255,.20);

      --icon-size: 108px;         /* ← ここで大きさ調整 */
      --icon-ring: rgba(255,255,255,.35);
      --icon-ring-active: rgba(255,255,255,.75);

      --shadow: 0 10px 24px rgba(0,0,0,.45);
    }

    html, body { height:100%; margin:0; background:#000; overflow:hidden; }

    /* iframeは全画面固定（Lookerは常にフル） */
    .view {
      position:absolute; inset:0;
      width:100vw; height:100vh;
      border:0;
      opacity:0;
      pointer-events:none;
      transition: opacity 180ms linear;
      background:#000;
    }
    .view.active { opacity:1; pointer-events:auto; }

    #topMask{
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;          /* まず6pxで。消えたら3pxに下げる */
      background: #000;
      z-index: 9999;
      pointer-events: none;
    }

    .rtClock{
      position: fixed;
      top: 18px;
      left: 0; right: 0;
      display: none;
      z-index: 120;
      pointer-events: auto;
      text-align: center;
      color: rgba(255,255,255,.92);
      text-shadow: 0 6px 18px rgba(0,0,0,.55);
      letter-spacing: .04em;
      white-space: nowrap;
    }

    /* 日付：1.5倍 */
    .rtDate{
      font-size: 84px;      /* ←ここが日付サイズ */
      font-weight: 500;
    }

    /* 曜日：今のサイズ感に合わせる（小さめ固定） */
    .rtDow{
      font-size: 56px;      /* ←（金）のサイズ */
      margin: 0 18px;
      font-weight: 500;
    }

    /* 時刻：1.5倍 */
    .rtTime{
      display: inline-flex;
      align-items: flex-start;
    }

    .rtHM{
      font-size: 84px;      /* ←ここが時刻(HH:MM)サイズ */
      font-weight: 500;
    }

    /* 秒：右下に小さめ */
    .rtSec{
      font-size: 42px;      /* ←時刻の半分くらい */
      margin-left: 10px;
      margin-top: 34px;     /* ←下げ具合（好みで微調整） */
      opacity: .92;
      letter-spacing: .06em;
    }

    /* メニュー：下に重ねる（画面分割しない） */
    #menuWrap {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: var(--menu-h);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index: 50;
      pointer-events: auto;
    
      transition: transform 420ms cubic-bezier(.22,.9,.2,1),
                  opacity   420ms cubic-bezier(.22,.9,.2,1);
    }
    
    #menuWrap.hidden{
      transform: translateY(110%);
      opacity: 0;
      pointer-events: none;
    }
    /* メニュー呼び出し“にゅ！”ゾーン（下端の透明バー） */
    #menuHandle{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 24px;            /* 18〜28で好み */
      z-index: 55;             /* menuWrap(50)より上でOK */
      background: transparent; /* 見えない */
      pointer-events: none;    /* 普段は無効（immersive時だけ有効化） */
    }

    /* メニューパネル（半透明の台座） */
    #menu{
      pointer-events: auto;
      display:flex;
      gap: var(--menu-gap);
      padding: 0;                 /* 台座いらん */
      background: transparent;    /* 透明 */
      border: 0;                  /* 枠なし */
      border-radius: 0;
      box-shadow: none;           /* 影なし */
      backdrop-filter: none;      /* ぼかしなし */
    }

    /* ボタン（ファンシーアイコン想定） */
    .mBtn{
      pointer-events: auto;       /* ←ここだけクリック有効 */
      width: var(--icon-size);
      height: var(--icon-size);
      border: 0;
      padding: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      position: relative;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      transform: translateZ(0);
    }

    /* アイコン画像（PNG/WebP/SVG） */
    .mBtn img{
      width: 100%;
      height: 100%;
      display:block;
      border-radius: 999px;
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
    }

    /* 輪っか（アクティブが分かりやすい） */
    .mBtn::after{
      content:'';
      position:absolute; inset:-6px;
      border-radius:999px;
      border: 3px solid var(--icon-ring);
      opacity: .9;
      transition: 140ms;
    }
    .mBtn.active::after{
      border-color: var(--icon-ring-active);
      box-shadow: 0 0 0 6px rgba(255,255,255,.10);
    }

    /* 押したときの気持ちよさ */
    .mBtn:active { transform: scale(0.96); }

    /* 左上デバッグ（任意） */
    #toast{
      position: fixed;
      left: 10px; top: 10px;
      z-index: 60;
      font-size: 12px;
      color: rgba(255,255,255,.85);
      background: transparent;  /* ← 黒箱消す */
      border: 0;                /* ← 枠消す */
      padding: 0;               /* ← 余白消す */
      border-radius: 0;
      pointer-events:none;
    }
    .subModal{
      position:fixed; inset:0;
      display:none;
      z-index: 200;
      background: rgba(0,0,0,.55);
      align-items:center;
      justify-content:center;
    }
    .subModal.show{ display:flex; }
    
    .subPanel{
      width: min(920px, 92vw);
      border-radius: 28px;
      background: rgba(15,15,15,.92);
      box-shadow: 0 18px 40px rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.10);
      padding: 18px 18px 22px;
    }
    
    .subHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom: 14px;
    }
    .subTitle{
      font-size: 34px;
      font-weight: 600;
      color: rgba(255,255,255,.92);
      letter-spacing:.04em;
    }
    .subClose{
      width:64px; height:64px;
      border-radius: 18px;
      border: 0;
      font-size: 44px;
      line-height: 1;
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.92);
    }
    
    /* ===== 子メニュー：タイル（アプリ一覧） ===== */
    .subGrid{
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3列が一番OSっぽい */
      gap: 26px;
    }
    
    /* タイル本体：正方形固定 */
    .subItem{
      aspect-ratio: 1 / 1;
      width: 100%;
      border: 0;
      border-radius: 28px;
    
      background: rgba(255,255,255,.10);
      box-shadow: 0 10px 24px rgba(0,0,0,.35);
    
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transform: translateZ(0);
    }
    
    /* 押したとき */
    .subItem:active{
      transform: scale(0.97);
      background: rgba(255,255,255,.15);
    }
    
    /* アイコン：タイルの主役 */
    .subIconImg{
      width: 65%;
      height: 65%;
      border-radius: 22px;
      object-fit: cover;
      display: block;
    }
    
    /* ラベル：短く太く */
    .subLabel{
      font-size: 20px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      color: rgba(255,255,255,.95);
      text-shadow: 0 6px 18px rgba(0,0,0,.35);
    }
    
    .subIcon{
      font-size: 44px;
    }

    .subItem:active{ transform: scale(0.98); }
    .subItem:active .subIconWrap{
      background: rgba(255,255,255,.22);
      transform: scale(0.97);
    }
    
    /* 画面が小さいときは自動で縮める（保険） */
    @media (max-width: 900px){
      :root{ --icon-size: 92px; --menu-h: 135px; --menu-gap: 16px; }
    }
    @media (max-width: 720px){
      :root{ --icon-size: 82px; --menu-h: 125px; --menu-gap: 12px; }
    }
  </style>
</head>
<body>
  <div id="topMask"></div>

  <div id="rtClock" class="rtClock">
    <span id="rtDate" class="rtDate"></span>
    <span id="rtDow"  class="rtDow"></span>
    <span id="rtTime" class="rtTime">
      <span id="rtHM" class="rtHM"></span>
      <span id="rtSec" class="rtSec"></span>
    </span>
  </div>

  <iframe id="view" class="view active" src="about:blank"></iframe>


  <!-- デバッグ -->
  <div id="toast">boot...</div>
  <div id="ttsTestBtn" class="dev-only" style="
    position: fixed;
    right: 16px;
    bottom: 90px;
    z-index: 9999;
    padding: 14px 16px;
    border-radius: 14px;
    background: rgba(255,255,255,.15);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.25);
    color: #fff;
    font-weight: 700;
  ">
    TTSテスト
  </div>

  <div id="clockDebug" style="
    position: fixed; right: 10px; bottom: 10px; z-index: 99999;
    font-size: 12px; color: #fff; background: rgba(0,0,0,.45);
    padding: 6px 8px; border-radius: 8px;">
    clock: -
  </div>

  <!-- メニュー（下部に重ね） -->
  <div id="menuWrap">
    <div id="menu" aria-label="menu">
      <button class="mBtn" data-page="home"   aria-label="home">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_HOME.png" alt="home">
      </button>
      <button class="mBtn" data-page="finance" aria-label="finance">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_FINANCE.png" alt="finance">
      </button>
      <button class="mBtn" data-page="schedule" aria-label="schedule">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_SCHEDULE.png" alt="schedule">
      </button>
      <button class="mBtn" data-page="temp" aria-label="temp">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_TEMP.png" alt="temp">
      </button>
      <button class="mBtn" data-page="school" aria-label="school">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_SCHOOL.png" alt="school">
      </button>
      <button class="mBtn" data-page="game"  aria-label="game">
        <img src="https://alleshokai-gif.github.io/signage-assets/assets/icons/ICON_GAME.png" alt="game">
      </button>
    </div>
  </div>
  <!-- 子メニュー（モーダル） -->
  <div id="subModal" class="subModal" aria-hidden="true">
    <div class="subPanel">
      <div class="subHead">
        <div id="subTitle" class="subTitle">MENU</div>
        <button id="subClose" class="subClose" aria-label="close">×</button>
      </div>
      <div id="subGrid" class="subGrid"></div>
    </div>
  </div>
  <div id="menuHandle" aria-hidden="true"></div>
<script>
(() => {

  try {
    // ====== 兄弟：ここだけ差し替えたらOK ======
    // ※ Lookerの「埋め込みURL」推奨（/embed/reporting/...）

    const DEV_MODE = false;

    document.addEventListener('DOMContentLoaded', () => {
      if (!DEV_MODE) {
        document.querySelectorAll('.dev-only')
          .forEach(el => el.remove());
      }
    });

    const GROUP_DEFAULT = {
      finance: { immersive:true },
      game:    { immersive:true },
      school:  { immersive:true },
      temp:    { immersive:true },
      schedule:{ immersive:true },
    };

    const PAGES = {
      home:    { url: 'https://lookerstudio.google.com/embed/reporting/c3341ade-526b-4ef1-8f77-e04e885ccf81/page/p_7ie80j9qzd', auto:true, immersive:false },
      temp:    { url: 'https://lookerstudio.google.com/embed/reporting/a9247f37-fc30-425b-a648-1c360e725914/page/p_2o3y60glyd', auto:true, immersive:false },
      school:  { url: 'https://lookerstudio.google.com/embed/reporting/e56ad71b-8c4c-4a59-88fa-99e773c8809a/page/p_20w8aknpyd', auto:true, immersive:false },
      finance: { url: 'https://lookerstudio.google.com/embed/reporting/27c09c89-3b08-46f8-bc49-db0d6e60c3fe/page/p_kbyrml84yd', auto:true, immersive:false },
      schedule:{ url: 'https://alleshokai-gif.github.io/signage-assets/calendar', auto:true, immersive:false }, // ★ここ
      game:    { url: 'https://alleshokai-gif.github.io/signage-assets/games/hissan', auto:false, immersive:true },
    };
    
    // ★ GAS Webアプリ（JSON API）のURL（あとで入れる）
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxImsH4sWBlEbYaiEl4X7mUmAsuzr3j8hRJeg7Hlq6fXSQRh79XCGB8PoX7arfbPrnbXQ/exec';
    const AUTO_ORDER = Object.keys(PAGES).filter(k => PAGES[k].auto);
    const AUTO_SEC = 60;              // 自動巡回 秒
    const IDLE_HOME_SEC = 300;        // 放置でホーム復帰（任意）
    const IDLE_FINANCE_SEC = 180;      // 家計は短め（任意）
    const IDLE_GAME_SEC = 300;        // ゲームは長め（任意）
    const BOOT_HOLD_SEC = 120;     // 起動直後だけ長めに見せる
    const DEBUG = false;
    const VOICE_BASE =  'https://alleshokai-gif.github.io/signage-assets/assets/voice/';
    const FLAME_GAS_URL = GAS_API_URL;

    // ====== DOM ======
    const view = document.getElementById('view');
    const toast = document.getElementById('toast');
    const menu = document.getElementById('menu');
    const menuWrap   = document.getElementById('menuWrap');
    const menuHandle = document.getElementById('menuHandle');

    const rtClock = document.getElementById('rtClock');

    const rtDate = document.getElementById('rtDate');
    const rtDow  = document.getElementById('rtDow');
    const rtHM   = document.getElementById('rtHM');
    const rtSec  = document.getElementById('rtSec');

    function pad2(n){ return String(n).padStart(2,'0'); }
    const DOW = ['日','月','火','水','木','金','土'];

    function updateRtClock(){
      const d = new Date();
      rtDate.textContent = `${d.getMonth()+1}/${d.getDate()}`;
      rtDow.textContent  = `（${DOW[d.getDay()]}）`;
      rtHM.textContent   = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      rtSec.textContent  = pad2(d.getSeconds()); // ←「:」なしで右下に出す
    }

    setInterval(updateRtClock, 250); // 1秒でもOK。ぬるぬるしたいなら250ms
    updateRtClock();

    toast.textContent = '';   // ← これ追加
    // ====== state ======
    let currentPage = null;
    let navToken = 0;

    let autoTimer = null;
    let autoIndex = 0;
    let autoEnabled = true;

    let idleTimer = null;

    // ===== TTS (Zundamon) =====
    const CLOCK_VOICE_BASE = 'assets/voice_clock/';

    let clockPlaying = false;

    async function playClockQueue(keys){
      if (clockPlaying) return;         // 連打でぐちゃぐちゃ防止
      clockPlaying = true;
      try{
        for (const k of keys){
          await playClockOne(k);        // ← ここで [CLOCK TRY] が必ず出る
        }
      } finally {
        clockPlaying = false;
      }
    }

    rtClock.addEventListener('pointerdown', (e)=>{
      console.log('CLOCKTAP7');
      e.preventDefault();
      e.stopPropagation();
      try{
        speakClockNow();
      }catch(err){
        console.error('speakClockNow failed', err);
      }
    }, true);

    function speakClockNow(){
      const d = new Date();
      const h24 = d.getHours();
      const m   = d.getMinutes();

      const keys = [];

      // ===== 時間帯分岐 =====
      if (h24 > 21 || (h24 === 21 && m >= 30)) {
        keys.push('NERO');
      }
      else if (h24 >= 6 && h24 <= 8) {
        keys.push('OHA');
        keys.push(...getClockKeys(d));
      }
      else {
        keys.push(...getClockKeys(d));
      }

      console.log('[CLOCK KEYS]', keys);
      playClockQueue(keys);
    }

    function pad2(n){
      return String(n).padStart(2,'0');
    }

    function getClockKeys(d){
      const h24 = d.getHours();
      const m = d.getMinutes();

      const ap = (h24 < 12) ? 'AM' : 'PM';

      const h12 = h24 % 12; // 0〜11
      const hKey = 'H' + pad2(h12);

      const mKey = 'M' + pad2(m);

      return [ap, hKey, mKey];
    }

    function playClockOne(key){
      return new Promise(resolve=>{
        const url = CLOCK_VOICE_BASE + key + '.wav';
        console.log('[CLOCK TRY]', url);

        const a = new Audio(url);
        a.onended = resolve;
        a.onerror = ()=>{
          console.log('❌ 404?', url);
          resolve();
        };
        a.play().catch(err=>{
          console.log('❌ play fail', url, err);
          resolve();
        });
      });
    }

    // ===== TTS (Zundamon) =====
    let _playing = false;

    async function playQueue(keys){
      if (_playing) return;
      _playing = true;
      try{
        for (const k of keys) await playOne(k);
      } finally {
        _playing = false;
      }
    }

    function playOne(key){
      return new Promise(resolve => {
        const a = new Audio(VOICE_BASE + key + '.wav');
        a.onended = resolve;
        a.onerror = resolve;
        a.play().catch(resolve);
      });
    }

    async function requestVoiceQueue(reason){
      try{
        setToast('VOICE REQ... (' + reason + ')');
    
        if (!GAS_API_URL || GAS_API_URL.includes('PASTE')) {
          setToast('VOICE STOP: GAS_API_URL not set');
          console.log('GAS_API_URL not set');
          return;
        }
    
        const url = GAS_API_URL + '?reason=' + encodeURIComponent(reason || '');
        console.log('requestVoiceQueue fetch', url);
    
        const r = await fetch(url, { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
    
        const res = await r.json();
        console.log('getVoiceQueueForNow success', res);
    
        const voices = (res && res.voices) ? res.voices : [];
        setToast('VOICE OK: ' + (voices.join(', ') || 'none'));
    
        if (!voices.length) return;
        await playQueue(voices);
    
      }catch(err){
        setToast('VOICE FAIL');
        console.log('getVoiceQueueForNow FAILED', err);
      }
    }

    // ===== TTS (Web Speech API) =====
    let _voice = null;

    function setToast(msg){
      if (!DEBUG) return;
      toast.textContent = msg;
    }

    function setMenuActive(page){
      [...menu.querySelectorAll('.mBtn')].forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
    }

    function resolveBase_(base){
      if (!base) return VOICE_BASE;
      if (base === 'clock') return CLOCK_VOICE_BASE;
      // もしURL直指定も許すなら：
      if (String(base).startsWith('http')) return base;
      return VOICE_BASE;
    }

    async function playTtsBase64(base64){
      const audio = new Audio("data:audio/mpeg;base64," + base64);
      audio.volume = 1.0;

      try{
        await audio.play();
      }catch(err){
        console.error('audio.play failed', err);
        // ここに toast とか出してもええ
      }

      return new Promise(resolve=>{
        audio.onended = resolve;
        audio.onerror = resolve; // 失敗しても先へ進める
      });
    }

    async function ttsTest(){
      try{
        setToast?.('TTS test: fetching...');

        const url = GAS_API_URL + '?reason=tts_test&text=' + encodeURIComponent('ぺんおだよ！てすとだよ。');

        const r = await fetch(url, { cache: 'no-store' });
        const j = await r.json();

        console.log('[TTS TEST RES]', j);

        if (!j.ok) throw new Error(j.error || 'TTS not ok');
        if (j.type !== 'tts') throw new Error('unexpected type: ' + j.type);
        if (!j.audio) throw new Error('audio empty');

        setToast?.('TTS test: playing');
        playTtsBase64(j.audio);

      }catch(err){
        console.error('TTS test failed', err);
        setToast?.('TTS test failed');
      }
    }

    function playWav(key, base){
      return new Promise(resolve=>{
        const url = base + key + '.wav';
        console.log('[WAV TRY]', { key, url });

        const a = new Audio(url);
        a.onended = resolve;
        a.onerror = ()=>{ console.log('❌ 404?', url); resolve(); };

        a.play().catch(err=>{
          console.log('❌ play fail', url, err);
          resolve();
        });
      });
    }

    async function playRadioQueue(items){
      for(const it of items){

        // ===== WAV =====
        if(it.type === 'wav'){
          const base =
            (it.base === 'clock') ? CLOCK_VOICE_BASE :
            (it.base) ? it.base :
            VOICE_BASE;

          await playWav(it.key, base);
          await wait(180);
          continue;
        }

        // ===== TTS =====
        if(it.type === 'tts'){
          const url = GAS_API_URL + '?text=' + encodeURIComponent(it.text || '');
          const res = await fetch(url, { cache:'no-store' });
          const j = await res.json();

          if(j && j.ok && j.audio){
            await playTtsBase64(j.audio);
          }
          await wait(180);
          continue;
        }
      }
    }

    async function requestRadioItems(reason){
      try{
        const url = GAS_API_URL + '?reason=' + encodeURIComponent(reason || '');
        console.log('[RADIO REQ]', url);

        const r = await fetch(url, { cache:'no-store' });
        if(!r.ok) throw new Error('HTTP ' + r.status);

        const j = await r.json();
        console.log('[RADIO RES]', j);

        console.log('[RADIO ITEMS]', (j.items||[]).map(x=>({type:x.type, speaker:x.speaker, key:x.key, text:(x.text||'').slice(0,20)})));

        const items = (j && j.items) ? j.items : [];
        if(!items.length) return;

        await playRadioQueue(items);

      }catch(err){
        console.error('[RADIO FAIL]', err);
      }
    }

    async function playMorningRadio(){

      const todayWeather = "今日は晴れやで。最高気温は14ど。洗濯は外でいけそうや。";
      const schoolInfo = "りおたん、今日は通常日。給食はカレーや。";

      const queue = [
        { type:'wav', key:'OHA', base: CLOCK_VOICE_BASE },

        { type:'tts', text: todayWeather },

        { type:'wav', key:'UMBRELLA_TODAY', base: VOICE_BASE },

        { type:'tts', text: schoolInfo },

        { type:'wav', key:'PEN', base: CLOCK_VOICE_BASE },
      ];

      await playRadioQueue(queue);
    }

    function wait(ms){
      return new Promise(r=>setTimeout(r,ms));
    }

    document.getElementById('ttsTestBtn')?.addEventListener('pointerdown', async (e)=>{
      e.preventDefault();
      e.stopPropagation();
      await requestRadioItems('radio_test'); // ← flameGASがitems返すルート
    }, true);

    // 放置復帰
    function resetIdleTimer(){
      if (idleTimer) clearTimeout(idleTimer);

      const sec =
        (currentPage === 'finance') ? IDLE_FINANCE_SEC :
        (currentPage === 'game')    ? IDLE_GAME_SEC :
                                    IDLE_HOME_SEC;

      if (!sec || sec <= 0) return;

      idleTimer = setTimeout(() => {
        // いきなり戻すと泣くから、まずホームへ
        goHome({ reason:'idle' });
      }, sec * 1000);
    }
    ['click','touchstart','mousemove','keydown'].forEach(ev=>{
      window.addEventListener(ev, resetIdleTimer, { passive:true });
    });
    
    let menuTimer = null;
    
    function showMenuTemporarily(ms=8000){
      menuWrap.classList.remove('hidden');
      clearTimeout(menuTimer);
      menuTimer = setTimeout(()=>{
        if (PAGES[currentPage] && PAGES[currentPage].immersive){
          menuWrap.classList.add('hidden');
        }
      }, ms);
    }

    // ====== navigation (preload swap) ======
    function navigate(page, { reason='manual' } = {}) {
      if (!PAGES[page]) return;
      if (reason === 'manual') stopAuto();

      const url = PAGES[page].url;
      const menuWrap = document.getElementById('menuWrap');

      setToast(`loading: ${page} (${reason})`);
      setMenuActive(page);

      // 前のonloadを外す（レース防止）
      view.onload = null;

      // この遷移だけ有効にするトークン
      const myToken = ++navToken;

      // ✅ この遷移で「shown確定」は1回だけにする
      let settled = false;
      const settleShown = (via) => {
        if (settled) return;
        if (myToken !== navToken) return;
        settled = true;

        currentPage = page;
        setToast(`shown${via}: ${page}`);
        resetIdleTimer();

        rtClock.style.display = (page === 'home') ? 'block' : 'none';

        // ===== immersive制御 =====
        const immersive = !!PAGES[page].immersive;
        
        if (immersive){
          menuWrap.classList.add('hidden');
          menuHandle.style.pointerEvents = 'auto';
        } else {
          menuWrap.classList.remove('hidden');
          menuHandle.style.pointerEvents = 'none';
        }

        // ====== 🔊 ここがトリガー：home表示確定で鳴らす ======
        if (page === 'home') {
          const allow = (reason === 'manual' || reason === 'boot');

          console.log('VOICE TRIGGER check', { page, reason, allow });
          if (allow) {
            setToast('VOICE TRIGGER');
            requestRadioItems('home'); // ★ここを固定にする
          }
        }
      };

      // onload来ない保険
      const FALLBACK_MS = 2500;
      const fb = setTimeout(() => settleShown('*'), FALLBACK_MS);

      // onload来たら即確定
      view.onload = () => {
        clearTimeout(fb);
        settleShown('');
      };

      // 遷移
      view.src = url;
    }
    
    function navigateUrl(url, parentKey, { reason='manual' } = {}){
      if (reason === 'manual') stopAuto();
    
      // 遷移開始で時計は消す（home以外）
      rtClock.style.display = 'none';
    
      setMenuActive(parentKey);
    
      view.onload = null;
      const myToken = ++navToken;
    
      let settled = false;
      const settle = () => {
        if (settled) return;
        if (myToken !== navToken) return;
        settled = true;
    
        currentPage = parentKey;
        resetIdleTimer();
      };
    
      const fb = setTimeout(settle, 2500);
      view.onload = () => { clearTimeout(fb); settle(); };
    
      view.src = url;
    }

    // ====== auto rotate ======
    function startAuto(){
      if (autoTimer) return;
      autoEnabled = true;

      // auto対象のどれかを表示してないなら先頭へ
      const first = AUTO_ORDER[0];
      if (!currentPage || !PAGES[currentPage].auto) {
        autoIndex = 0;
        navigate(first, { reason:'auto' });
      } else {
        autoIndex = AUTO_ORDER.indexOf(currentPage);
        if (autoIndex < 0) autoIndex = 0;
      }

      const firstDelay = BOOT_HOLD_SEC * 1000;

      autoTimer = setTimeout(() => {
        autoTimer = setInterval(() => {
          if (!autoEnabled) return;
          autoIndex = (autoIndex + 1) % AUTO_ORDER.length;
          navigate(AUTO_ORDER[autoIndex], { reason:'auto' });
        }, AUTO_SEC * 1000);
      }, firstDelay);

    }

    function stopAuto(){
      autoEnabled = false;
      if (autoTimer) {
        clearTimeout(autoTimer);
        clearInterval(autoTimer);
      }
      autoTimer = null;
    }

    function goHome({reason='manual'} = {}){
      navigate('home', { reason });
      startAuto(); // ホームは自動巡回復帰スイッチ
    }

    // ====== menu events ======
    window.addEventListener('pointerdown', sfxUnlock, { once:true });

    let _lastTap = 0;

    function onMenu(e){
      // 連打/二重イベント抑止（350ms以内は捨てる）
      const t = Date.now();
      if (t - _lastTap < 350) return;
      _lastTap = t;

      e.preventDefault(); // 余計なclick生成を抑える端末がある
      sfxUnlock();
      sfxMenu();

      const btn = e.target.closest('.mBtn');
      if (!btn) return;
      const page = btn.dataset.page;

      if (page === 'test') {
        // ✅ これが最強：確実に鳴る
        playQueue(['MORNING_SUMMARY']); // 何でもええ
        // もしくは GAS 呼び出し確認したいなら：
        // requestRadioItems('manual');
        return;
      }

      if (page === 'home') return goHome({reason:'manual'});
      
      // ★ school/game/finance は子メニューを開く
      if (SUB[page]) return openSubMenu(page);
      
      navigate(page, { reason:'manual' });

    }

    menu.addEventListener('pointerdown', onMenu);

    // --- 子メニュー定義（まずはここだけでOK） ---
    const SUB = {
      school: [
        { label:'給食/予定',  iconImg:'ICON_schoolTOP.png', page:'school' },      // 既存PAGES.school
        { label:'学級閉鎖', iconImg:'ICON_shoolclose.png', url:'https://lookerstudio.google.com/embed/reporting/543880b2-7b47-4237-8f34-a38f5a8da822/page/p_o5u8y9pt0d' },
        { label:'閉鎖マップ', iconImg:'ICON_schoolcloseMAP.png', url:'https://lookerstudio.google.com/embed/reporting/ac202568-eb4b-409a-8436-2766b21221ad/page/p_un4ijj2v0d' },
      ],
      game: [
        { label:'九九', iconImg:'ICON_gameKUKU.png',  url:'https://alleshokai-gif.github.io/kuku-game/' },
        { label:'筆算', iconImg:'ICON_gameHS.png',  page:'game' },            // 既存PAGES.game(筆算)
        { label:'オセロ', iconImg:'ICON_gamesOTHERO.png',  url:'https://alleshokai-gif.github.io/signage-assets/games/othello/' },
        { label:'ボンボン分析', iconImg:'ICON_bonbon.png', url:'https://lookerstudio.google.com/embed/reporting/5e1dd718-4c59-4f7f-b380-9af4b919003e/page/p_fhnahkeo0d' },
      ],
      finance: [
        { label:'家計ダッシュ', iconImg:'ICON_financeTOP.png', page:'finance' },  // 既存PAGES.finance
        { label:'ピックアップ経費', iconImg:'ICON_financePIC.png', url:'https://lookerstudio.google.com/embed/reporting/9fb4191b-bed4-4c43-8609-2d54b25bddcb/page/p_sd2wt4noyd' },
        { label:'光熱費', iconImg:'ICON_financeUTILITY.png', url:'https://lookerstudio.google.com/embed/reporting/fe2966db-7911-4345-9bb9-e7f20ce67f1e/page/p_kbyrml84yd' },
        { label:'ベンダーランク', iconImg:'ICON_financeVR.png', url:'https://lookerstudio.google.com/embed/reporting/7aa1e911-8971-4724-aea3-731a3290eb97/page/p_vdxclf0zzd' },
        { label:'支出ランク', iconImg:'ICON_financeAmtR.png', url:'https://lookerstudio.google.com/embed/reporting/a9e7808d-828d-4c1f-8317-5adc3e44386f/page/p_4s4wd13m0d' },
      ],
    };

    registerSubPages_(SUB, PAGES);
    console.log('SUB after register:', SUB);
    console.log('SUB pages check:',
      Object.fromEntries(Object.entries(SUB).map(([k, arr]) => [
        k,
        arr.map(x => ({ label: x.label, page: x.page, url: x.url }))
      ]))
    );
    console.log('PAGES keys:', Object.keys(PAGES).sort());


    const ICON_BASE = 'https://alleshokai-gif.github.io/signage-assets/assets/icons/';
    // --- 子メニューDOM ---
    const subModal = document.getElementById('subModal');
    const subGrid  = document.getElementById('subGrid');
    const subTitle = document.getElementById('subTitle');
    const subClose = document.getElementById('subClose');

    function slugify_(s){
      return String(s || '')
        .toLowerCase()
        .replace(/\s+/g,'_')
        .replace(/[\/\(\)（）]+/g,'_')
        .replace(/[^a-z0-9_]+/g,'')
        .replace(/_+/g,'_')
        .replace(/^_|_$/g,'');
    }
    
    function registerSubPages_(SUB, PAGES){
      Object.keys(SUB).forEach(group=>{
        const def = GROUP_DEFAULT[group] || { immersive:false };
    
        SUB[group].forEach(it=>{
          // すでに page 指定ならそれを使う（親ページでもOK）
          if (it.page) return;
    
          // url 指定は pageKey を生成して PAGES へ登録、SUB は page に差し替え
          if (it.url){
            const key = `${group}_${slugify_(it.label) || 'item'}`;
    
            // 既に同じキーがあるなら連番（衝突回避）
            let k = key, n = 2;
            while (PAGES[k]) { k = `${key}_${n++}`; }
    
            PAGES[k] = {
              url: it.url,
              auto: false,
              immersive: def.immersive,
            };
    
            delete it.url;
            it.page = k;
          }
        });
      });
    }

    function openSubMenu(parentKey){
      const items = SUB[parentKey];
      if (!items || !items.length) return;
    
      subTitle.textContent = parentKey.toUpperCase();
      subGrid.innerHTML = '';
    
      for (const it of items){
        const b = document.createElement('button');
        b.className = 'subItem';
      
        // ===== アイコン（画像を直で配置） =====
        if (it.iconImg){
          const img = document.createElement('img');
          img.src = ICON_BASE + it.iconImg;
          img.className = 'subIconImg';
          b.appendChild(img);
        }
        
        // ===== ラベル =====
        const label = document.createElement('span');
        label.className = 'subLabel';
        label.textContent = it.label;
        
        b.appendChild(label);

        // クリック処理（既存そのまま）
        b.addEventListener('pointerdown', (e)=>{
          e.preventDefault();
          sfxUnlock(); sfxMenu();
          stopAuto();                // ★ これ追加（サブメニューは navigate 通らんから）
          // ついでに時計は即消す（後述）
          rtClock.style.display = 'none';  // ★ これも追加
      
          if (it.page){
            navigate(it.page, { reason:'manual' });
          }      
          closeSubMenu();
        });
      
        subGrid.appendChild(b);
      }

    
      subModal.classList.add('show');
      subModal.setAttribute('aria-hidden', 'false');
    }
    
    function closeSubMenu(){
      subModal.classList.remove('show');
      subModal.setAttribute('aria-hidden', 'true');
    }
    
    subClose.addEventListener('pointerdown', (e)=>{ e.preventDefault(); sfxMenu(); closeSubMenu(); });
    subModal.addEventListener('pointerdown', (e)=>{
      if (e.target === subModal) { sfxMenu(); closeSubMenu(); } // 背景タップで閉じる
    });

    menuHandle.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      showMenuTemporarily(4000);
    });
    // 👇 ここに追加
    menuWrap.addEventListener('pointerdown', ()=>{
      if (PAGES[currentPage] && PAGES[currentPage].immersive){
        showMenuTemporarily(8000); // 操作したら延命
      }
    });
    
    // ====== boot ======
    currentPage = null;

    // ★C: 起動直後は必ず navigate 経由で home を踏む（settleShown を確実に通す）
    navigate('home', { reason: 'boot' });

    // その後 auto 開始（home を起点に回す）
    startAuto();

    resetIdleTimer();

    const CLOCK_SPEAK_TIMES = ['06:55','07:20','07:40','18:30','21:00'];
    const CLOCK_KEY_PREFIX  = 'clockSpoke_';

    function reasonByHm_(hm){
      switch(hm){
        case '06:55': return 'clock_0655';  // 朝ショート
        case '07:20': return 'clock_0720';  // 朝フル
        case '07:40': return 'clock_0740';  // 週明けだけ（ギア）
        case '18:30': return 'clock_1830';  // 夜準備
        case '21:00': return 'clock_2100';  // 夜最終
        default:      return 'clock';
      }
    }

    function ymdLocal_(d){
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    let __lastHM = '';

    function tickClockVoice(){
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const hm = `${hh}:${mm}`;

      const el = document.getElementById('clockDebug');
      if (el) {
        const next = nextSpeakHm_(hm);
        el.textContent = `clock:${hm} (${now.toLocaleTimeString()}) next:${next}`;
      }

      // ★同じ分は1回だけ（同一ループ内の多重呼び出し対策）
      if (hm === __lastHM) return;
      __lastHM = hm;

      console.log('[tickClockVoice]', { now: now.toString(), hm });

      // ★対象時刻以外は無視
      if (!CLOCK_SPEAK_TIMES.includes(hm)) return;

      // ★追加：直近発火クールダウン（例：45秒）
      const cooldownMs = 45 * 1000;
      const last = Number(localStorage.getItem('CLOCK_LAST_FIRE_MS') || 0);
      const diff = Date.now() - last;
      if (diff >= 0 && diff < cooldownMs) {
        console.log('[tickClockVoice] skipped by cooldown', { hm, diff });
        return;
      }

      const day = ymdLocal_(now);
      const key = `${CLOCK_KEY_PREFIX}${day}_${hm}`;

      // ★同一日・同一時刻は1回だけ（端末の再読込や二重起動対策）
      if (localStorage.getItem(key)) {
        console.log('[tickClockVoice] skipped by localStorage', key);
        return;
      }

      // ★先に書く（発火前にガードを立てる）
      localStorage.setItem(key, '1');
      localStorage.setItem('CLOCK_LAST_FIRE_MS', String(Date.now()));

      // ★ここが重要：hmに応じたreasonを投げる
      const reason = reasonByHm_(hm);
      requestRadioItems(reason);
    }

    console.log('[BOOT] start clock loop', new Date().toString());
    setInterval(tickClockVoice, 5 * 1000); // ★15秒→5秒推奨（分変化ガードあるから軽い）
    tickClockVoice(); // ★起動直後に1回

    function nextSpeakHm_(hmNow){
      const times = CLOCK_SPEAK_TIMES.slice().sort(); // "06:55"みたいな文字列想定
      for (const t of times) if (t > hmNow) return t;
      return times[0] || '-';
    }

    // ===== SFX (Web Audio) =====
    let _ac = null;

    function sfxUnlock(){
      if (_ac) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      _ac = new AC();

      // unlock用に無音を一瞬鳴らす（端末によって必要）
      const o = _ac.createOscillator();
      const g = _ac.createGain();
      g.gain.value = 0.0001;
      o.connect(g).connect(_ac.destination);
      o.start();
      o.stop(_ac.currentTime + 0.02);
    }

    function sfxTone(freq=440, ms=80, type='sine', vol=0.12){
      if (!_ac) return;
      const t0 = _ac.currentTime;
      const o = _ac.createOscillator();
      const g = _ac.createGain();

      o.type = type;
      o.frequency.setValueAtTime(freq, t0);

      // クリック音防止のエンベロープ
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);

      o.connect(g).connect(_ac.destination);
      o.start(t0);
      o.stop(t0 + ms/1000 + 0.02);
    }

    // 使いやすいプリセット
    function sfxMenu(){      sfxTone(880, 35, 'square', 0.06); }      // ピッ
    function sfxCorrect(){   sfxTone(784, 60,'sine', 0.10); setTimeout(()=>sfxTone(1046, 80,'sine',0.12), 70); } // ポーン
    function sfxWrong(){     sfxTone(160,120,'sawtooth',0.14); setTimeout(()=>sfxTone(120,120,'sawtooth',0.14), 70); } // ブー

  } catch (e) {
    const t = document.getElementById('toast');
    if (t) t.textContent = 'ERR: ' + (e && e.message ? e.message : e);
    console.log(e);
  }

})();
</script>
